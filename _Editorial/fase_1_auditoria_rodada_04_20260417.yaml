pacote_transversal:

  grep_abyc_familia_a:
    executado: true
    criterio: "rg 'ABYC A-\\d{2}' em todos os .md do vault"
    ocorrencias_totais: 37
    resultados_por_norma:
      A-20:
        ocorrencias: 1
        locais: ["nota mestre (TODO edição)"]
        status_registro_central: "TODO"
        contradicao: false

      A-25:
        ocorrencias: 1
        locais: ["nota mestre (TODO edição)"]
        status_registro_central: "TODO"
        contradicao: false

      A-28:
        ocorrencias: 14
        locais:
          - "Normas mestre (galvanic isolators, TODO)"
          - "Inspeção de Cabos (R03: marcada como tema a verificar via HTML comment)"
          - "CAIS (Pier) (AC) (R04: literatura; tópico a confirmar)"
          - "Isolador Galvânico/Transformador (8× como Galvanic Isolators)"
          - "Sonda-Profundímetro-Sonar (thruhull fittings — rotulagem suspeita)"
        status_registro_central: "desconhecido (bug 0003)"
        contradicao: true
        descricao_contradicao: |
          Pelo menos 3 rótulos distintos para A-28 no corpus em diferentes momentos:
          (a) 'galvanic isolators' (nota mestre + Isolador Galvânico) — alinhado à literatura marinha comum
          (b) 'marine electrical circuit diagrams' (Inspeção de Cabos — corrigido na R03)
          (c) 'thruhull fittings' (Sonda — corrigido na R04)
          Conclusão: A-28 permanece `desconhecido` até verificação externa. A família de rótulos distintos confirma o padrão sistêmico previsto em R03.

      A-31:
        ocorrencias: 11
        locais:
          - "Normas mestre (Lightning Protection, corrigido na R01)"
          - "Bonding (Lightning Protection, alinhado)"
          - "Carregador de Bateria (R04: era 'Battery Chargers' — P0 corrigido)"
          - "Alternador DC (R04: era 'Battery Chargers' — P0 corrigido)"
          - "Isolador Galvânico (para-raios, alinhado)"
          - "Referências em planos/YAMLs de auditoria"
        status_registro_central: "Lightning Protection (pós-R01)"
        contradicao: true
        descricao_contradicao: |
          Nota mestre e Bonding afirmam A-31 = Lightning Protection (correto pós-R01).
          Carregador de Bateria e Alternador DC afirmavam A-31 = Battery Chargers.
          Contradição interna do corpus — P0 detectado e corrigido em R04.

      A-33:
        ocorrencias: 1
        locais: ["Gerador (AC) — 'Exhaust Systems'"]
        status_registro_central: "ausente no registro"
        contradicao: false
        nota: "A-33 é padrão ABYC para sistemas de escape em embarcações; rótulo em Gerador (AC) é consistente com literatura. Registrar no registro central."

  grep_geladeira_dc:
    executado: true
    criterio: "rg '[Gg]eladeira DC' em todos os .md do vault"
    ocorrencias_totais: 8
