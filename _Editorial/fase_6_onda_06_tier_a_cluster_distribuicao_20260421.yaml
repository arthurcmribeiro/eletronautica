new_decisions:
  - id: "DEC-36"
    title: "Separador de carga como termo guarda-chuva — taxonomia explícita"
    statement: "Quando uma nota falar de 'divisor de carga', 'separador de carga' ou 'combinador', deve explicitar a taxonomia completa: combinador (ACR/VSR), isolador (diodo/FET), chave seletora manual/automática, DC-DC charger. Cada família tem princípio de operação, queda de tensão e aplicação distintos; 'separador' é termo guarda-chuva, não tecnologia. Aplicado em Divisores de Carga (DC) por feedback direto do usuário, mas fica estabelecido para qualquer nota futura que toque em combinação de bancos DC."
    rationale: "Mercado BR usa 'divisor' e 'separador' de forma intercambiável; usuário apontou que isso obscurece a história da tecnologia (diodo → FET → combinador → DC-DC) e perde a distinção entre soluções. Também importante explicar por que combinadores modernos (Blue Sea ML-ACR, Arieltek DVSR) substituíram isoladores diodo/FET na maioria das aplicações chumbo-chumbo homogêneas."
    scope: "Distribuição DC, combinação de bancos, divisores/separadores/isoladores/DC-DC"

  - id: "DEC-37"
    title: "Backfeed por ramal manual de bomba de porão — modo de falha documentado"
    statement: "Em toda nota que discuta bomba de porão automática, deve estar documentado: AMBOS os ramais (manual e automático) devem sair do MESMO barramento hotline, nunca apenas o automático. Motivo: se só o automático estiver na hotline e o manual passar pela chave geral comutada, quando o sensor acionar a bomba pelo ramal automático, a tensão entra no terminal '+ auto', atravessa o ponto elétrico comum interno da bomba (terminais '+ auto' e '+ manual' são o mesmo nó elétrico), sobe pelo ramal manual até a saída da chave 3 posições do painel (se esquecida em MANUAL-ON), reenergiza o barramento comutado e alimenta o barco inteiro COM A CHAVE GERAL DESLIGADA. Mitigações aceitáveis: (a) ambos ramais do mesmo barramento hotline (regra 1); (b) diodo Schottky de bloqueio ≥ 15 A no ramal manual; (c) LED-piloto vermelho ativo em MANUAL para o operador perceber; (d) teste pós-instalação com chave geral OFF + carregador OFF + acionamento manual do automático + medição V no barramento comutado (tem que permanecer 0 V)."
    rationale: "Caso real descrito pelo usuário: barco em que a tripulação deixou a chave 3 posições do painel em MANUAL-ON ao fechar o barco, com chave geral desligada e carregador off. Quando o automático acionou (nível subiu), a corrente voltou pelo ramal manual e reenergizou o barco. Modo de falha silencioso que só é descoberto em manutenção ou em sinistro. Pertence ao TL;DR, Falhas comuns, Erro técnico e FAQ."
    scope: "Bomba de porão, hotline DC, sistemas always-on, safety crítica"

  - id: "DEC-38"
    title: "Convenção de chaveamento — positivo para bomba, negativo para alarme"
    statement: "Em toda nota de bomba de porão e alarme de porão em embarcação, deve estar explicitada a convenção brasileira e internacional: (a) BOMBA DE PORÃO — float switch e sensor eletrônico chaveiam o POSITIVO; os terminais da bomba já vêm de fábrica rotulados como '+ auto / + manual / – common'; Rule/Rule-A-Matic/Attwood/Johnson/Jabsco/Seaflo/Shurflo seguem essa topologia; o negativo é comum e permanente via barramento do shunt BMV. (b) ALARME DE ALTA ÁGUA (e afins) — sensor fecha o NEGATIVO para disparar painéis de alarmes industriais/náuticos (Borel, MGM, Maretron, Offshore Systems), que operam em lógica 'common-positive'; é mais robusto contra curto acidental ao casco e permite sensores passivos de dois fios. Não confundir as duas lógicas: bomba = chaveia positivo; alarme = chaveia negativo."
    rationale: "Feedback direto do usuário durante o retrofit da Hotline: esclarecer o padrão BR de chaveamento no positivo para bomba vs. negativo para alarme. A convenção explica por que terminais de bomba já vêm com '+ auto / + manual / – common' e evita confusão com outras topologias (chaveamento bipolar, interruptor no negativo)."
    scope: "Bomba de porão, alarme de alta água, chaveamento de motores DC em embarcação"

