  New decisions documented (all from direct user feedback):
  - DEC-36: Taxonomy "separador de carga" — umbrella term with explicit taxonomy
    (combinador/isolador/seletora/DC-DC); historical evolution (diode → FET →
    ACR → DC-DC); commercial refs by market (Blue Sea USA, Arieltek Brazil)
  - DEC-37: Backfeed via bilge pump manual leg — BOTH circuits (manual +
    automatic) must be on the SAME hotline bus; real-world failure mode documented
    (general switch off + charger off + panel 3-way switch forgotten in
    MANUAL-ON → auto triggers → current backfeeds through manual leg →
    re-energizes entire boat). Mitigations: same hotline + Schottky blocking
    diode + LED pilot + post-install test.
  - DEC-38: Positive-switching convention for bilge pumps (Rule/Attwood/Johnson/
    Jabsco/Seaflo/Shurflo use "+auto / +manual / –common" terminals; float
    switch and electronic sensor switch the positive) vs negative-switching
    convention for high-water alarms (common-positive industrial panels like
    Borel/MGM/Maretron/Offshore Systems use sensors that close to ground).

  Metrics:
