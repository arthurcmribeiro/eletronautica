new_decisions:
  - id: "DEC-39"
    title: "Cluster sanitário-galley-utilidade tem TWO-tier template (climate-aux engineering-curated × sanitário/galley premium-l3)"
    statement: "Notas de climate-aux com risco regulado por norma única (Aquecedor, Blower, Boiler, Bomba AC) ficam no nível engineering-curated com normas_citadas estruturadas (objetos {id, titulo, edicao, clausulas}). Notas com regulação multi-jurisdição (sanitário, galley, dessalinizador) sobem para premium-l3 com normas_citadas em lista plana ampliada (35-50+ itens) cobrindo Brasil + EUA + Internacional + Europa. A escolha do tier por nota deve responder a: (1) número de jurisdições aplicáveis; (2) risco a vida/ambiente/saúde pública; (3) presença de zonas regulatórias específicas (NDZ, Polar Code, HELCOM, ARIE)."
    rationale: "Aplicar premium-l3 forçado em climate-aux gera ruído (normas duplicadas, ABYC A-7 já cobre tudo); em sanitário, structured-norms perde a granularidade da MARPOL Reg.11.1.1 vs 11.1.2 vs Polar Code vs HELCOM. Two-tier preserva rigor onde é necessário e simplicidade onde é suficiente."
    scope: "Meta — governança da fase 6, escolha de tier por nota dentro de cluster"

  - id: "DEC-40"
    title: "Notas-filhas para arquiteturas alternativas que merecem nota dedicada"
    statement: "Quando uma arquitetura alternativa (vácuo central / chiller central) tem distinção tecnológica e regulatória suficiente para nota dedicada, criar nota-filha em vez de subseção dentro da nota-mãe. Aplicado nesta onda em: (a) [[Sistema Sanitário a Vácuo - VacuFlush - SailVAC]] como nota-filha de Bomba de Banheiro / Holding Tank (era subseção); (b) [[Ar-Condicionado Chiller - Chilled Water Marine]] como nota-filha de Ar-Condicionado Marine — Sistema Completo (era subseção). Critério: arquitetura tem fabricantes próprios, normas próprias, falhas próprias e duty-cycle próprio."
    rationale: "Vácuo (Dometic SailVAC) e chiller (Cruisair MTBlue) são tecnologias distintas, com aplicações distintas (mega-iate vs iate convencional), que merecem desenvolvimento próprio. Cobertura SEO + GEO também separada — usuário busca 'VacuFlush manutenção' diretamente, não via 'bomba de banheiro'."
    scope: "Estrutura — taxonomia de notas, hierarquia mãe/filha"

  - id: "DEC-41"
    title: "ISO 17479 reconhecida como norma específica do macerador (separada de ISO 8099)"
    statement: "ISO 17479 (Small craft — Toilet waste discharge systems with macerators) é a norma específica para sistemas de descarte com macerador, distinta de ISO 8099-1/-2 (sistemas de retenção). Toda nota que aborde macerador ou descarte deve canonicalizar ISO 17479 explicitamente, não apenas ISO 8099. Aplicado em Macerador, Bomba de Águas Negras, Holding Tank, Bomba de Banheiro e (parcialmente) Sistema Sanitário a Vácuo."
    rationale: "ISO 8099 cobre retenção (holding tank, mangueira); ISO 17479 cobre o sub-sistema com macerador (cisalhamento, tamanho de partícula, capacidade hidráulica, anti-sifão específica). Confundir as duas leva a especificação técnica imprecisa e a referência cruzada incorreta."
    scope: "Sanitário, macerador, descarte de águas negras"

