# =============================================================================
# CONVENÇÃO DE CITAÇÃO (resumida)
# =============================================================================
convencao:
  padrao_hedge_externo: |
    Citação de norma em `external_verification_pending`:
    `ABYC X-## (edição a verificar)` no frontmatter `normas_citadas` +
    HTML comment no corpo: `<!-- TODO-CITAÇÃO: ver _Editorial/registro_normas.yaml -->`

  padrao_retired: |
    NUNCA citar norma em `retired_watch_citations`. Se detectada, sinalizar P0.

  padrao_edition_unknown: |
    `CÓDIGO (edição a verificar)` é aceitável temporariamente.
    Preferência: sempre citar edição quando conhecida.

# =============================================================================
# PROCESSO DE ATUALIZAÇÃO
# =============================================================================
processo:
  quando_verificacao_externa_conclui: |
    1. Atualizar `_Editorial/registro_normas.yaml` (move de 'desconhecido' para status real)
    2. Remover TODO-CITAÇÃO das notas com hedge
    3. Atualizar este arquivo: categoria vira `contradiction_resolved_watch`
    4. Commit descrevendo a resolução
    5. Rodar grep do código para garantir que nenhuma citação órfã permanece

  frequencia_revisao: "mensal"
  responsavel: "editorial + claude-code"
