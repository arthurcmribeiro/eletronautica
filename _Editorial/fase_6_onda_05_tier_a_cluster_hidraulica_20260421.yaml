new_decisions:
  - id: "DEC-31"
    title: "Nota-mãe de óleos hidráulicos como referência cruzada"
    statement: "Criada 'Óleos Hidráulicos Marine — Guia Completo' como nota-mãe taxonômica do cluster hidráulico. Toda nota de atuador hidráulico ou elétrico-submerso (flap, plataforma, passarela, estabilizador, guincho, davit, catraca, thruster, direção, reversor, trim-tilt) deve linkar para essa nota-mãe, que consolida: (a) classificação ISO VG + HLP/HVLP/HFC/HFDU; (b) SAE J300/J306 motor e gear; (c) ATF Dexron III/VI/Mercon V-LV/ATF+4/ATF Type F; (d) NMMA TC-W3/FC-W; (e) API GL-1 a GL-5; (f) tabela reversor fluid-by-fabricante; (g) tabela aplicação-por-aplicação. Padrão fé-de-ofício para retrofits em ondas futuras."
    rationale: "O domínio hidráulico estava fragmentado (cada nota dizia 'ATF' sem explicar qual, ou 'hidráulico' sem classe ISO). Nota-mãe consolida e remove redundância."
    scope: "Hidráulica marinha, atuadores, lubrificantes de transmissão"

  - id: "DEC-32"
    title: "DEC-26 (regulação refrigerante) é RETROFIT obrigatório, não opcional"
    statement: "Toda nota de sistema frigorífico pré-existente (fora da Onda 4) deve receber retrofit da DEC-26 ao ser tocada em qualquer onda subsequente. Aplicado com sucesso em Geladeira-Freezer e Icemaker (Onda 5); fica estabelecido que qualquer nota futura sobre refrigeração deve passar por essa camada antes de ser considerada Tier A ou S."
    rationale: "Paridade regulatória entre notas de refrigeração, independentemente da onda em que foram trabalhadas."
    scope: "Refrigeração, HVAC, frigorífico em geral"

  - id: "DEC-33"
    title: "Cadência (a) auto-contínua adotada para Tier A — com gates de segurança"
    statement: "A partir da Onda 5, cadência (a) auto-contínua é o padrão para Tier A: sem pausa humana obrigatória entre ondas. Preservadas as gates de segurança: (1) commit + push por onda; (2) YAML audit por onda; (3) atualização de plano_execucao_auditoria.md por onda; (4) pausa obrigatória permanece em qualquer escolha estrutural (novo DEC, nova sub-fase, alteração de escopo)."
    rationale: "Template está consolidado após 5 ondas; gates documentais já garantem auditabilidade; pausa manual virou gargalo sem benefício técnico proporcional."
    scope: "Meta — governança da fase 6"

  - id: "DEC-34"
    title: "TL;DR variável (7-9 regras) por complexidade do tópico"
    statement: "A rigidez de 9 regras em TL;DR deixa de ser obrigatória a partir da Onda 5: tópicos menos complexos ou menos ambíguos (ex.: Catraca, Icemaker) podem receber 7-8 regras; tópicos de alta complexidade regulatória (ex.: Óleos Hidráulicos Marine, Thruster, Estabilizador) mantêm 9 regras. Meta: prioridade é clareza, não contagem. Observação empírica: todas as notas da Onda 5 ficaram em 9 regras naturalmente, demonstrando que o padrão consolida-se sem forçar."
    rationale: "Flexibilidade comunicacional; responde ao feedback do usuário ('pode variar')."
    scope: "Meta — governança da fase 6, TL;DR"

  - id: "DEC-35"
    title: "GL-4 vs GL-5 em redutor com bronze — alerta obrigatório"
    statement: "Toda nota que descreva redutor sinfim-coroa com coroa de bronze (comum em davit, algumas catracas, redutores legacy de thruster) deve explicitar: GL-5 pode atacar o bronze pela ação dos aditivos EP sulfurados; use exclusivamente GL-4 ou o fluido do fabricante. Warning callout em Davit e Catraca documentam o ponto."
    rationale: "Erro recorrente em manutenção de equipamentos náuticos legacy; perícia frequente."
    scope: "Lubrificação de engrenagens, gear oil em equipamentos náuticos"

