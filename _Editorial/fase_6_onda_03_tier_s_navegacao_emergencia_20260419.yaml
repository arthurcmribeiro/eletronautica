new_decisions:
  - id: "DEC-21"
    title: "GMDSS documentado como ecossistema integrado"
    statement: "VHF (SOLAS Cap IV) + DSC (ITU-R M.493/M.541) + EPIRB (Cospas-Sarsat) + AIS-SART (IEC 61097-14) + MOB-AIS e PLB devem ser entendidos como módulos de um sistema GMDSS único, não peças isoladas. Em notas de comunicação/emergência, citar as normas-raiz IMO SOLAS Cap IV + Cospas-Sarsat C/S T.001/T.018 + ITU-R M-séries simultaneamente."
    rationale: "Padroniza a camada de normas regulatórias de emergência em todo o domínio 50 (comunicação) + notas de segurança em outras áreas."
    scope: "Domínio 50 + equipamentos de salvatagem em outros domínios"

  - id: "DEC-22"
    title: "COLREGs como direito internacional vinculante"
    statement: "Em todas as notas que tratem de luzes de navegação, radar, AIS, COLREGs 1972 + emendas deve ser citada com número de Regra específica (Rule 5, 6, 7, 20-31, 38, Annex I-IV), não apenas 'COLREGs'. NORMAM-01 é substituída por NORMAM-201 (comerciais) + NORMAM-211 (recreio) + NORMAM-205 (passageiros) + NORMAM-204 (SMM) conforme aplicável."
    rationale: "Remove ambiguidade legal e fornece ancoragem jurídica precisa."
    scope: "Todas as notas de navegação, iluminação e sinalização"

  - id: "DEC-23"
    title: "ABNT NBR 10898 + NBR 13434 + NBR IEC 60598-2-22 como conjunto de sinalização e emergência"
    statement: "Notas de iluminação de emergência devem citar o conjunto ABNT NBR 10898 (sistema) + NBR 13434 (sinalização) + NBR IEC 60598-2-22 (luminárias), além de ISO 15370 (LLL), ISO 17631 (planos) e ISO 24409 (sinais)."
    rationale: "Reconhece que sinalização e iluminação são arquitetura integrada, não peças separadas."
    scope: "Domínio 55 (iluminação/sinalização) + emergência em outras áreas"

  - id: "DEC-24"
    title: "ISAF Offshore Special Regulations como referência voluntária excelente"
    statement: "Em notas de segurança offshore (MOB, EPIRB, coletes, harness), citar ISAF OSR como referência técnica consolidada mesmo quando não aplicável juridicamente à embarcação — serve de baseline de boas práticas."
    rationale: "Fornece padrão mundial consolidado em um só documento abrangente."
    scope: "Segurança offshore / salvatagem"

  - id: "DEC-25"
    title: "Cospas-Sarsat C/S T.001 + T.018 + G.005 como trilogia PLB/EPIRB"
    statement: "Toda menção a beacon 406 MHz (EPIRB, PLB) deve citar o conjunto C/S T.001 (primeira geração) + C/S T.018 (segunda geração, Return Link) + C/S G.005 (codificação), não apenas 'Cospas-Sarsat'."
    rationale: "Distingue gerações e inclui protocolo de codificação."
    scope: "EPIRB / PLB / MOB com Cospas-Sarsat"

