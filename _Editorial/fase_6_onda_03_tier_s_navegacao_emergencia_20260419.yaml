  - DEC-22: COLREGs Rules cited specifically (not generic); NORMAM-01 → NORMAM-201/211/205/204
  - DEC-23: ABNT NBR 10898 + 13434 + IEC 60598-2-22 as signaling+emergency triad
  - DEC-24: ISAF OSR as voluntary excellence baseline for offshore safety
  - DEC-25: Cospas-Sarsat C/S T.001+T.018+G.005 as PLB/EPIRB trilogy

  TODOs resolved (5):
