  - SOLAS (edição a verificar) Ch II-2 Reg 42 in Iluminação Emergência
    → resolved to SOLAS II-2 Reg 13 + II-1 Reg 41-43
  - USCG 33 CFR (edição a verificar) in NAVEGAÇÃO
    → resolved to 33 CFR Part 183 + 84 + 46 CFR Part 111

