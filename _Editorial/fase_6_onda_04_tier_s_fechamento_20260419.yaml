new_decisions:
  - id: "DEC-26"
    title: "Regulação ambiental de refrigerantes como camada normativa obrigatória"
    statement: "Toda nota que trate de sistema frigorífico (AC 220V, AC 12V DC, refrigerador, freezer, chiller) deve incluir a camada de regulação ambiental de refrigerantes como família normativa explícita: Protocolo de Montreal + Emenda de Kigali (2016) + EPA SNAP Program + AIM Act (2020) nos EUA + EU F-gas Regulation 517/2014 + Resolução CONAMA 267/2000 + EPA Section 608 Technician Certification. Não se trata apenas de 'meio ambiente' — é conformidade regulatória técnica que afeta projeto, manutenção e perícia."
    rationale: "Alinha as notas de refrigeração ao mesmo rigor normativo das notas elétricas. Evita que 'refrigerante' seja tratado como detalhe operacional quando na verdade é item regulado com técnico certificado obrigatório."
    scope: "Todas as notas de sistema frigorífico, HVAC, refrigeração"

  - id: "DEC-27"
    title: "ABYC H-22 + ISO 15083 como par primário para bomba de porão e alarme de alagamento"
    statement: "Notas de bomba de porão, sensor de alagamento e alarme de alta água devem citar ABYC H-22 (2023) + ISO 15083:2020 como par primário, com USCG 33 CFR 183 + SOLAS II-1 Reg 21/35-1 como camadas complementares. Diferenciar claramente bomba (atuação) e alarme (alerta) em todas as notas aplicáveis."
    rationale: "Consolida família normativa e estabelece distinção arquitetural obrigatória."
    scope: "Bomba de porão, alarme de alagamento, sensor de nível d'água"

  - id: "DEC-28"
    title: "NEC Art. 440 como referência dimensional para AC marine"
    statement: "Toda nota de ar-condicionado marine (220V ou 12V DC) deve citar explicitamente NEC Art. 440 — Air-conditioning and refrigerating equipment, documentando os conceitos MCA (Minimum Circuit Ampacity) e MOCP (Maximum Overcurrent Protection) como ponto de partida do dimensionamento elétrico."
    rationale: "Elimina o erro comum de dimensionar AC 'por watts'; ancora a prática no padrão internacional reconhecido."
    scope: "Ar-condicionado marine 220V, 12V DC, chillers"

  - id: "DEC-29"
    title: "Transformador isolador vs autotransformador — distinção obrigatória"
    statement: "Notas sobre transformadores bivolt, transformador de entrada ou transformador isolador devem explicitar que autotransformador NÃO oferece isolação galvânica, não apresenta a mesma função de bonding do neutro secundário, e é frequentemente vendido (incorretamente) como solução de isolação. IEC 60076 + IEC 61558 (para transformadores de segurança/isolação) + INMETRO 637/2014 devem ser citados."
    rationale: "Correção de erro recorrente em retrofits e importações de equipamento."
    scope: "Transformadores em geral no domínio 30"

  - id: "DEC-30"
    title: "Nota bônus fora do plano — formalização de práticas de expansão"
    statement: "Quando durante a reescrita surgir tema tecnicamente adjacente ao plano original (ex.: AC 12V DC surgindo a partir de AC 220V), a criação de nota extra é permitida e deve ser registrada no YAML da onda como 'nota nova' com fase_6_reescrita própria e documentação do contexto. Limite: 1-2 notas bônus por onda, sempre com backlink na nota-mãe."
    rationale: "Permite crescimento orgânico do vademecum sem descontrole do plano; registra exceções de forma auditável."
    scope: "Meta — governança da fase 6"

