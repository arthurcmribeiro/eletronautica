      - "Tabela de cabos DC sem explicitar queda-base é risco alto em mãos de eletricista iniciante."
      - "Correntes em amp sem tensão base podem confundir em sistema 24V/48V."
    P2:
      - "Valores envelhecem (equipamentos mudam consumo) — falta política de revisão periódica."

  contradicoes_inter_notas:
    - contradicao: "Precisa cruzar com [[Dimensionamento de Cabos DC — Cálculo Prático]] (Thread 1-B) para verificar se os valores da tabela batem com as fórmulas da nota de cálculo."
      notas_afetadas: ["10_Fundamentos_e_Projeto/Dimensionamento de Cabos DC — Cálculo Prático.md"]
