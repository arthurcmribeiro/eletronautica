      - "Adicionar citação explícita ABYC E-11 (2023) §11.6.4 como origem dos 3%."
      - "Adicionar campo normas_citadas no frontmatter."
    P2_futuro:
      - "Mini-tabela 24V / 48V."
      - "Linha sobre split-phase 120/240V de barco importado."
      - "Diagrama 'inspeção de 15 minutos' integrando esta tabela com [[MOC — Diagnóstico e Manutenção]]."

  taxonomia:
    REG-BR: "baixa"
    ENG: "média"
    FAB: "baixa"
    CAMPO: "alta"
    DIDAT: "alta"

  veredito: "revisao_menor"
