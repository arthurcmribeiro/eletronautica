    source_urls_count: 3
    conformidade_convencao: "parcial"
    gaps:
      - "Nota é de referência numérica mas source_urls não aponta para ABYC E-11 nem ISO 13297 específicas — aponta para 'standards' (página raiz)."
      - "Falta campo normas_citadas."
      - "Falta campo 'ultima_verificacao_numerica' — valores de campo envelhecem."

  conteudo_tecnico:
    forca: |
      Nota é enxuta e operacional, que é o PROPÓSITO. Faixas realistas para o mercado
      brasileiro. Diferencia bem chumbo-ácido vs LiFePO4 em tensões. Avisa sobre
      queda de tensão 3% crítico vs 10% conforto (alinhado com ABYC e ISO 13297).
    precisao_cientifica: "boa com ressalvas"
    profundidade: "proposital — é cheat-sheet, não deve aprofundar"
    gaps_tecnicos:
      - gap: "Tensão chumbo-ácido 12,6–12,8V 'cheio' é razoável mas não distingue inundada vs AGM vs GEL (varia 0,1–0,3V)."
        impacto: "baixo"
        acao: "Adicionar nota de rodapé 'varia por química; consultar datasheet'."
