        impacto: "alto — é a variável crítica do dimensionamento"
        acao: |
          Adicionar coluna ou legenda: 'Seções conservadoras para queda ≤3% (circuitos
          críticos). Para cargas não-críticas (até 10%), seções podem ser menores — usar
          [[Dimensionamento de Cabos DC — Cálculo Prático]].'
      - gap: "Correntes típicas (ex.: inversor 1000W ≈ 90A) não explicita tensão DC (12V)."
        impacto: "médio"
        acao: "Explicitar '1000W @ 12V DC, rendimento ~90%' para cada estimativa."
      - gap: "Não cobre sistema 24V nem 48V (cada vez mais comum em lancha premium e LiFePO4)."
        impacto: "médio"
        acao: "Adicionar mini-tabela 24V e 48V ou ao menos fatores de conversão."
      - gap: "Faixa AC 'monofásica 127/220V' não trata explicitamente split-phase 120/240 de barcos importados."
        impacto: "médio"
        acao: "Adicionar linha explicando cenário de barco importado com split-phase em marina BR."

