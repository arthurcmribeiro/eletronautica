    normas_citadas:
      - codigo: "(implícito) ABYC E-11 para queda 3%"
        edicao_ano_presente: false
        status_real: "vigente (2023)"
        acao: "Tornar explícita: 'Limite 3% queda em circuitos críticos — ref. ABYC E-11 (2023) §11.6.4.'"
      - codigo: "(implícito) ISO 13297 para queda"
        edicao_ano_presente: false
        acao: "Explicitar se a referência é ABYC ou ISO (valores são parecidos mas não idênticos)."
    conformidade_convencao: 0.0
    observacao: "Nota é 100% de valores numéricos sem citação normativa explícita. Paradoxal: os números VÊM de normas mas a norma não aparece. Risco didático grande — aluno memoriza número sem saber a origem."

  conteudo_didatico:
    forca_didatica: "alta para triagem, média para aprendizado"
    estrutura: "tensões DC → tensões AC → queda → correntes → cabos → proteção → cautelas"
    gaps_didaticos:
      - "Excelente bloco 'Cautelas importantes' no final — mantém nota honesta."
      - "Falta diagrama de como usar a tabela em uma inspeção de 15 min."

  sinais_de_risco:
    P0: []
