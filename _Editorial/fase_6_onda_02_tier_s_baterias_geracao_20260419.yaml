    Fase 6 Onda 2: DEC-11 recalibrado em 9 notas Tier S baterias/geracao

    Aplica template premium expandido (TL;DR + danger + glossario 40-47
    termos + normas maximizadas) no cluster baterias/geracao/conversao:

    - Tipos de Bateria (468->564 linhas)
    - BMS (270->367)
    - Litio LiFePO4 (240->339) [DEC-14 normas criadas]
    - Carregador AC to DC (362->449) [ABYC A-31 TODO resolvido]
    - Monitor BMV Shunt (270->356)
    - Alternador DC (363->456) [DEC-14 + ABYC A-31 TODO resolvido]
    - Gerador DC (201->295) [DEC-14]
    - Inversora DC to AC (382->478)
    - Placa Solar DC (229->343) [DEC-14]

    Metricas:
    - 9 notas, 862 linhas adicionadas
    - 18 callouts novos (9 tip + 9 danger)
    - 381 termos de glossario (media 42/nota vs ~21 em Onda 1)
    - 112 normas expandidas/canonicalizadas (media 13.9/nota)
    - 4 notas com normas_citadas criadas do zero (DEC-14)

    Padroes reforcados: quimica define carregador, BMS requisito em litio,
    fusivel 178mm ABYC E-11, disconnect abrupto/load dump ISO 16750-2,
    ignition protection, MPPT padrao, AC coupling, IEC 62619/62620/63056,
    UL 1973/9540A, NBR 16690:2019.

    Recalibragem pos-Onda 1: glossario ~2x maior, normas maximizadas
    (vademecum da eletrica nautica).

    Proxima etapa: pausa para revisao humana antes de Onda 3.

