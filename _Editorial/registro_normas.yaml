# ============================================================================
# REGISTRO CENTRAL DE NORMAS — Eletronautica Vault
# ============================================================================
# Fonte única de verdade para citações normativas no vault.
# Uso:
#   1. Qualquer citação de norma em nota deve bater com "status" aqui.
#   2. Scripts de validação consultam este YAML (ver _Editorial/convencao_citacao_normativa.md).
#   3. Atualizações exigem verificação da publicação oficial (link em "fonte_oficial").
#
# Taxonomia de status:
#   - vigente         : publicação ativa e em uso.
#   - vigente_revisao : ativa mas em processo conhecido de revisão; verificar antes de citar.
#   - aposentada      : retirada pelo órgão emissor; NÃO citar como ativa.
#   - substituida     : retirada E com sucessor explícito; citar apenas como histórico.
#   - desconhecido    : placeholder; auditar antes de primeira citação.
#
# Revisão: sempre que uma nota for auditada na Fase 1-4, atualizar "ultima_verificacao"
# para a norma citada. Revisão geral: schedule #13 (proposto).
# ============================================================================

meta:
  versao: "1.0"
  criado_em: "2026-04-16"
  mantenedor: "Responsável Editorial Eletronautica"
  revisao_schedule: "13_drift_publicacoes_oficiais (proposto)"

