notas_com_calculo:

  tier_1_formulas_pesadas:
    # Contêm fórmulas explícitas, exemplos numéricos, e tabelas de dimensionamento
    - caminho: "10_Fundamentos_e_Projeto/Dimensionamento de Cabos DC — Cálculo Prático.md"
      tipo_calculo: "I=P/V, R_máx=ΔV_máx/I, A_mín=(ρ×L)/R_máx, tabela AWG"
      premissas_criticas: "ρ=0.0175 Ω·mm²/m, queda 3%=0.36V@12V, temperatura, ida+volta"
    - caminho: "10_Fundamentos_e_Projeto/Dimensionamento de Banco de Baterias — Cálculo de Autonomia.md"
      tipo_calculo: "C_banco=C_total/DOD, Ah=Wh/V, efeito Peukert, margem 25%"
      premissas_criticas: "DOD AGM 50% vs LiFePO4 80%, C/20 vs C/5 vs C/2, temperatura"
    - caminho: "10_Fundamentos_e_Projeto/Lei de Ohm e Cálculos Básicos.md"
      tipo_calculo: "V=IR, P=VI=I²R=V²/R, exemplo de queda 7.8%"
      premissas_criticas: "FP em AC não coberto, resistência vs temperatura"
    - caminho: "40_Distribuicao_Protecao_e_Aterramento/Fusíveis DC — Proteção Contra Sobrecorrente.md"
      tipo_calculo: "Coordenação fusível/cabo, 2000W@12V=181A, tabela cor/amperagem"
      premissas_criticas: "ABYC E-11 ampacity, cabo protege carga vs cabo protege circuito"
    - caminho: "10_Fundamentos_e_Projeto/Referência Rápida — Valores de Campo.md"
      tipo_calculo: "Tabelas: tensão 12V repouso/float, correntes típicas, queda máxima, tolerâncias AC"
      premissas_criticas: "Valores de referência rápida — se errados, contamina todo diagnóstico de campo"

  tier_2_especificacoes_significativas:
    - caminho: "20_Baterias_e_Armazenamento/Monitor de Bateria - BMV - Shunt.md"
      tipo_calculo: "I=V/R shunt (500A/50mV=0.0001Ω), eficiência carga 95% lítio / 80% chumbo"
    - caminho: "20_Baterias_e_Armazenamento/Tipos de Bateria.md"
      tipo_calculo: "Custo/Wh/ciclo: AGM 0.0025 vs LiFePO4 0.001; ciclos 300-500 vs 2000-5000"
    - caminho: "30_Energia_e_Conversao/Inversora (DC To AC).md"
      tipo_calculo: "P_DC=P_AC/eficiência: 2000W÷0.92=2174W; 12V→181A; THD<3%"
    - caminho: "20_Baterias_e_Armazenamento/Bancos de Bateria.md"
      tipo_calculo: "Configuração série/paralelo, dimensionamento por classe de embarcação"
    - caminho: "20_Baterias_e_Armazenamento/BMS — Battery Management System.md"
      tipo_calculo: "4 células × 3.2V = 12.8V pack; C-rate 0.5C-1C; temperatura 0°C-60°C"
    - caminho: "30_Energia_e_Conversao/Placa Solar (DC).md"
      tipo_calculo: "Fatores de perda: sombreamento, temperatura, cabo, controlador, absorção"
    - caminho: "40_Distribuicao_Protecao_e_Aterramento/Cabeamento Náutico.md"
