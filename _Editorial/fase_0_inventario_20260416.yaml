      corrente e comprimento. Cita ABYC E-11 tabela com 3%=0.36V@12V. Nota mais usada
      em campo — erro aqui = cabo subdimensionado = incêndio.
    prioridade: "P1"
    sinais_preliminares: >
      EVIDÊNCIA: Resistividade declarada ρ=0.0175 Ω·mm²/m (cobre). Recalcular passo a passo.
      Verificar: comprimento ida+volta, temperatura ambiente, fator K, derating por agrupamento.
      Checar se tabela é ABYC E-11 literal ou adaptação.

