diagnostico_preliminar:

  dominios_mais_maduros:
    - dominio: 10_Fundamentos_e_Projeto
      justificativa: >
        Maior volume (5.864 linhas, 20 notas, 293 l/nota). Contém as 3 notas com cálculo
        mais pesado (Dimensionamento de Cabos DC, Dimensionamento de Banco de Baterias,
        Lei de Ohm). A nota 'Normas e Regulamentações' é o ponto de referência normativa
        de todo o vault — EVIDÊNCIA: é a única nota que explicitamente mapeia ISO 10133 como
        aposentada e recomenda ISO 13297:2020. Frontmatter 100% completo no domínio inteiro.

    - dominio: 40_Distribuicao_Protecao_e_Aterramento
      justificativa: >
        18 notas (4.626 linhas). Concentra os 4 temas com maior risco de segurança da vida:
        bonding, DR (GFCI), isolação galvânica, aterramento. EVIDÊNCIA: Aterramento.md cita
        ABYC E-11 + IEC 60092 + NORMAM-211 + limite de resistência ≤1Ω; Proteção Dr.md
        distingue norma de sistema (ABYC E-11) de norma de produto (IEC 61008/61009);
        Isolador Galvânico.md exige certificação ABYC A-28 explicitamente.

    - dominio: 20_Baterias_e_Armazenamento
      justificativa: >
        Menor em contagem (6 notas) mas maior densidade (339 l/nota). EVIDÊNCIA: Tipos de
        Bateria.md tem tabela comparativa com custo por Wh ao longo da vida útil (AGM vs
        LiFePO4); BMS.md cobre limites de célula e C-rate com especificidade; Monitor de
        Bateria.md documenta erro de calibração prático (200Ah configurado em banco envelhecido
        de 130Ah reais = SoC fantasma). Domínio tecnicamente sólido mas com risco de conflito
        inter-notas (ver sinais_de_risco).

    - dominio: 50_Navegacao_Instrumentacao_e_Comunicacao
      justificativa: >
        14 notas, 290 l/nota. EVIDÊNCIA: NAVEGAÇÃO (BB, BE e Alcançado).md cita COLREGS 72
        com regras específicas (23, 25, 30), ISO 16180:2011 com ano, e documenta conflito
        prático entre COLREGS e prática brasileira para embarcações pequenas. NMEA 2000/0183
        cita IEC 61162-1 e -3. Qualidade normativa acima da média do vault.

  dominios_esqueleto:
    - dominio: 90_Revisao_Manual
      justificativa: >
        2 notas (362 linhas). Estabilizador.md e Motor de Trim - Tilt.md. Sem MOC funcional,
        sem backlinks significativos. _Editorial/Auditoria e lacunas.md nota que 'Estabilizador'
        foi corrigido de 'tensão' para 'movimento' — original era sobre estabilizador de tensão,
        incorretamente atribuído ao vault náutico. Conteúdo está isolado da rede semântica.

  dominios_com_problema_estrutural:
    - dominio: 70_Hidraulica_Climatizacao_e_Utilidades
      justificativa: >
        25 notas mas densidade baixa (196 l/nota). _Editorial/Auditoria e lacunas.md confirma
        que 'Bancos de Bateria, Tipos de Bateria, sensores de nível podem ser condensados'.
        Inclui notas de equipamentos simples que provavelmente não justificam nota independente
        (Limpador de Parabrisas 152 linhas, Catraca 171 linhas). NOTA: 'USB 12V (Power).md'
        NÃO está neste domínio (está em 60_Automacao), erro da v1 corrigido.

  # ─────────────────────────────────────────────────

  sinais_de_risco_ja_visiveis:

    - id: R01
      tipo: gap_critico_edicao_clausula
      dominio: vault_inteiro
      descricao: >
        62 notas citam normas técnicas (ABYC, ISO, IEC, NORMAM, COLREGS, etc.), mas apenas
        ~5 notas fornecem edição/ano e cláusula/seção específica. As 5 com boa citação:
        Luz de Tope (COLREGS Regra 21/23/25, ISO 16180:2011), NAVEGAÇÃO BB/BE (COLREGS regras
        + ISO 16180:2011), Isolador Galvânico (ABYC A-28 certificação), Proteção Dr (IEC
        61008/61009 como norma de produto), Carregador de Bateria (ABYC A-31 + IEC 60335-2-29).
        As outras 57 notas citam norma no nível de família ('ABYC E-11', 'ISO 13297') sem
        seção, o que torna a citação não-verificável e não-rastreável.
      severidade: critica
      evidencia: "Verificado por grep exaustivo em todas as 147 notas."
      prioridade_verificacao: P1

    - id: R02
      tipo: norma_aposentada_citada_como_vigente
      dominio: "20_Baterias, 40_Distribuicao"
      descricao: >
        ISO 10133 (extra-low voltage DC installations) é citada em pelo menos 3 notas como
        referência ativa: Bonding.md, Bancos de Bateria.md, Tipos de Bateria.md. Porém, a nota
        'Normas e Regulamentações.md' em 10_Fundamentos CORRETAMENTE identifica ISO 10133 como
        aposentada e recomendata ISO 13297:2020 como substituta. Contradição interna do vault:
        a nota mestre sabe que é obsoleta, as notas derivadas continuam citando.
      severidade: alta
      evidencia: "Normas e Regulamentações.md identifica aposentadoria; grep confirma citação em 3+ notas."
      prioridade_verificacao: P1

    - id: R03
      tipo: conflito_potencial_cross_nota
      dominio: 20_Baterias_e_Armazenamento
      descricao: >
        'Tipos de Bateria.md' (463 linhas) e 'Lítio LiFePO4.md' (238 linhas) cobrem território
        sobreposto. EVIDÊNCIA CONCRETA: Tipos de Bateria declara LiFePO4 DOD 80-90% e ciclos
        2000-5000; a nota de LiFePO4 foca em instalação/BMS sem repetir esses valores, mas o
        risco é que correções futuras em uma nota não propaguem para a outra. Além disso,
        'Bancos de Bateria.md' cruza com 'Dimensionamento de Banco.md' (10_Fundamentos) nos
        critérios de dimensionamento. _Editorial/Auditoria e lacunas.md já identifica essas
        notas como candidatas a condensação.
      severidade: alta
      evidencia: "Grep + leitura comparativa; _Editorial/Auditoria e lacunas.md confirma sobreposição."
      prioridade_verificacao: P1

    - id: R04
      tipo: confusao_norma_sistema_vs_produto
      dominio: vault_inteiro
      descricao: >
        Múltiplas notas misturam norma de SISTEMA (ABYC E-11 para arquitetura de instalação)
        com norma de PRODUTO (IEC 61008 para DR, IEC 60335-2-29 para carregador, IEC 62619
        para bateria lítio) sem diferenciar. Poucas notas fazem essa distinção corretamente —
        Proteção Dr.md e Carregador de Bateria.md são exemplos positivos.
        A confusão importa porque norma de sistema diz COMO instalar, norma de produto diz
        O QUE o equipamento deve atender. Aluno que confunde vai citar IEC 61008 para justificar
        uma instalação quando deveria citar ABYC E-11.
      severidade: media
      evidencia: "Detectado na análise normativa de 62 notas; exemplos positivos vs negativos comparados."
      prioridade_verificacao: P2

    - id: R05
      tipo: validate_vault_limitado
      dominio: _ci_scripts
      descricao: >
        validate_vault.py (88 linhas) valida: (1) title/note_type no frontmatter, (2) reviewed_on/
        review_jurisdiction/source_urls em note_types técnicos, (3) wikilinks resolvidos, (4)
        4 padrões sensíveis: NORMAM-02, ABYC TE-13, NBR 13885, ABNT NBR 16033.
        NORMAM-02 tem 1 exceção (Normas e Regulamentações.md).
        O que o script NÃO faz: não valida completude de citação normativa (edição, ano,
        cláusula); não detecta norma aposentada além dos 4 padrões; não verifica cálculos;
        não cruza consistência inter-notas.
        CORREÇÃO v2: a v1 dizia "exceções amplas demais" — isso é impreciso. As exceções são
        mínimas (1 arquivo). O problema real é que o escopo de validação é estreito demais
        para a ambição do vault.
      severidade: media
      evidencia: "Leitura completa de validate_vault.py (88 linhas), scripts/vault_tools.py."
      prioridade_verificacao: P2

    - id: R06
      tipo: notas_orfas
      dominio: "60_Automacao, 70_Hidraulica"
      descricao: >
        'USB 12V (Power).md' (60_Automacao — NÃO 70_Hidraulica como dito na v1) e
        'Limpador de Parabrisas.md' (70_Hidraulica) têm ≤1 backlink. Backlog de Evolução
        Editorial.md confirma como item pendente (checkbox vazio). Pipeline visual integrou
        USB 12V via spec _visuals/specs/usb-12v-queda-ruido-carga.json, mas link semântico
        no corpo do vault ainda ausente.
      severidade: baixa
      evidencia: "_Editorial/Backlog de Evolução Editorial.md item pendente; verificado por contagem de backlinks."
      prioridade_verificacao: P3

    - id: R07
      tipo: assimetria_visual
      dominio: "55_Iluminacao, 90_Revisao"
      descricao: >
        55_Iluminacao tem 11 notas mas apenas 1 spec visual integrada
        (iluminacao-navegacao-emergencia-camadas.json). COLREG é inerentemente visual (arcos,
        posicionamento, cores). 90_Revisao tem 0 visuais.
        Em contraste: 10_Fundamentos tem 11 visuais, 40_Distribuicao tem 7.
        _Editorial/Inventário Visual da Base.md confirma a cobertura assimétrica e lista
        candidatos, mas o pipeline ainda não os gerou.
      severidade: media
      evidencia: "_Editorial/Inventário Visual da Base.md lista cobertura por domínio."
      prioridade_verificacao: P2

