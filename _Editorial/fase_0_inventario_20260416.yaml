# ─────────────────────────────────────────────────
# AMOSTRA DE AUDITORIA
# ─────────────────────────────────────────────────
#
# METODOLOGIA (v2):
# O Prompt Mestre pede 20-30 notas cobrindo: todos os domínios, 100% de 00_Mapas,
# toda nota com cálculo, toda nota com norma explícita, todo o _Editorial.
#
# Com 12 notas com cálculo significativo e 12 notas com carga normativa pesada
# (com sobreposição considerável), o critério obrigatório gera um núcleo de ~18
# notas únicas calc+norm. Somando 5 _Editorial e representantes MOC, a amostra
# chega a 35 notas.
#
# PROPOSTA: 35 notas, divididas em:
# - Bloco A: _Editorial (5 notas, auditoria de governança)
# - Bloco B: 00_Mapas (6 MOCs prioritários, não 16 — ver justificativa)
# - Bloco C: Núcleo técnico-normativo-cálculo (18 notas únicas)
# - Bloco D: Representantes restantes (6 notas para completar cobertura de domínio)
#
# Sobre 00_Mapas: 10 dos 16 MOCs têm 12-28 linhas e são listas de wikilinks.
# Auditá-los como nota completa é desproporcional — proponho verificação
# automatizada de links (via validate_vault.py) para esses 10, e auditoria
# formal apenas dos 6 com >40 linhas ou conteúdo narrativo.
# Se o responsável editorial exigir 100% de 00_Mapas, a amostra sobe para 45.
# ─────────────────────────────────────────────────

amostra_auditoria:

  # ──── BLOCO A: _EDITORIAL (5 notas) ────

  - caminho: "_Editorial/Auditoria Geral da Base.md"
    dominio: "_Editorial"
    motivo_escolha: "280 linhas. Auditoria anterior de 14/04. Estabelece baseline — todo resultado da Fase 1 é delta em relação a este documento."
    prioridade: "P1"
    sinais_preliminares: >
      LEITURA CONFIRMADA: documenta correção de scripts (exclusão .claude/worktrees),
      promoção de 3 rascunhos, 140 notas com 0 erros. Recomenda 12 visuais prioritários.
      Identifica USB 12V e Limpador como subintegrados. Contagem de 140 precisa ser
      reconciliada com os 147 atuais.

  - caminho: "_Editorial/Auditoria e lacunas.md"
    dominio: "_Editorial"
    motivo_escolha: "105 linhas. 15 lotes de revisão manual documentados. Estado final: todas as notas em 'technical-review-l1', nenhuma em 'curated-v1'."
    prioridade: "P1"
    sinais_preliminares: >
