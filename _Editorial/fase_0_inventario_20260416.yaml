      292 linhas. Fórmulas: C_banco=C_total/DOD, Ah=Wh/V. Efeito Peukert: C/20=100%,
      C/5=70%, C/2=50%. Exemplo: 1000Wh/dia × 2 dias ÷ 0.5 DOD = 4000Wh → 333Ah → 416Ah
      com margem 25%.
    prioridade: "P1"
    sinais_preliminares: >
      EVIDÊNCIA: Peukert simplificado (3 pontos). Verificar se a simplificação é conservadora.
      Tabela de consumo (GPS 2W, VHF 6-25W, radar 40W) cruza com Referência Rápida — verificar
      consistência. DOD AGM 50% pode conflitar com Tipos de Bateria (50%) vs campo (40-50%).

