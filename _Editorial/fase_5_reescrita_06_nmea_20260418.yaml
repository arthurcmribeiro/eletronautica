        - "Conflito de enderecos N2K que nao some apos reboot/reset (firmware corrompido ou NAME duplicado)"
        - "AIS Class A com integracao N2K (reporting obrigatorio por COLREGS/IMO)"
        - "Multiplexer 0183 com >3 talkers ou misturando baud rates"
        - "DSC do VHF nao recebe posicao apos gateway (risco regulatorio: ITU-R M.493 + NORMAM-204)"
      destaque: "ROI explicito - 1h de integrador certificado < custo de chartplotter premium ou DSC sem coordenadas em emergencia real"

