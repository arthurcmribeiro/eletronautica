        - "Baud 0183: 4800 (v2.x) ou 38400 (v3/HS); misturar = silencio"
        - "N2K backbone exige 2 terminadores 120 Ohm + 1 power tap (fusivel 3 A, 9-16 V DC)"
        - "Resistencia ponta-a-ponta do backbone (rede desligada) ~ 60 Ohm"
        - "Drop N2K <= 6 m por norma; manter < 3 m na pratica"
        - "TX/RX invertido = falha #1 do 0183 (em RS-422 diferencial: TX+ -> RX+, TX- -> RX-)"
        - "SeaTalkNG/SimNet != N2K plug-and-play (camada fisica compativel; pinagem e suporte do fabricante decidem)"

