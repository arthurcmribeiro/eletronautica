# 1. METODOLOGIA
# =============================================================================
metodologia:
  eixos:
    esforco:
      unidade: "horas"
      niveis:
        - "baixo: ate 2h"
        - "medio: 2h a 4h"
        - "alto: acima de 4h"
    impacto:
      unidade: "score qualitativo (1-10)"
      criterios:
        - "alcance pedagogico (quantos alunos tocam)"
        - "peso de risco fisico/legal se a nota errar"
        - "densidade de links no vault"
    risco:
      unidade: "score qualitativo (1-10)"
      criterios:
        - "risco normativo (ISO/ABYC/NORMAM em revisao)"
        - "risco de contradicao intra-vault"
        - "risco de alucinacao tecnica se o modelo reescrever sem supervisao"
  formula_prioridade: "prio = 0.40*impacto + 0.30*(10-risco) + 0.30*(10-esforco_norm)"
  convencao: "prioridade maior = entregar primeiro"

