name: Vault Check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate vault
        run: python scripts/validate_vault.py

      - name: Build manifest
        run: python scripts/build_manifest.py

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: content-manifest
          path: manifest/content-manifest.json
