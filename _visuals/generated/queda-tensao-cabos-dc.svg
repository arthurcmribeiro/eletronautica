<line x1="916" y1="512" x2="900.4115427318801" y2="521.0" stroke="#5B6B79" stroke-width="2" stroke-linecap="round"/>
<line x1="916" y1="512" x2="900.4115427318801" y2="503.0" stroke="#5B6B79" stroke-width="2" stroke-linecap="round"/>
<rect x="926" y="300" width="386" height="425" fill="#FFFDF8" rx="18" ry="18" stroke="#D9E2EC" stroke-width="1"/>
