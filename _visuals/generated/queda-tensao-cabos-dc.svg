<text x="972" y="402" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Calcular corrente e comprimento</text>
<text x="972" y="421" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">total</text>
