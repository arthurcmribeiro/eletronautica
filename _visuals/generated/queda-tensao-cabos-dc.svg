<text x="972" y="474" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Definir queda admissivel por tipo</text>
<text x="972" y="493" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">de carga</text>
<rect x="950" y="533" width="10" height="10" fill="#2A9D57" rx="18" ry="18"/>
<text x="972" y="546" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Aumentar bitola ou reduzir</text>
<text x="972" y="565" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">percurso</text>
<rect x="950" y="605" width="10" height="10" fill="#2A9D57" rx="18" ry="18"/>
<text x="972" y="618" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Considerar 24 V/48 V em cargas</text>
<text x="972" y="637" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">grandes</text>
<text x="70" y="862" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">FORMATO: CAUSA-EFEITO  |  PRIORIDADE: ALTA</text>
