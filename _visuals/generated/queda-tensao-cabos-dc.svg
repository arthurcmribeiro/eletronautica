<text x="544" y="402" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Equipamento desarma ou perde</text>
<text x="544" y="421" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">rendimento</text>
