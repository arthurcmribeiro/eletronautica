<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
<rect x="50" y="38" width="1300" height="116" fill="#FFFDF8" rx="22" ry="22" stroke="#E4D8C8" stroke-width="1"/>
<text x="78" y="68" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="start">ELETRO NAUTICA / VISUAL TECNICO</text>
<text x="78" y="92" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="start">Queda de tensao em cabos DC</text>
<text x="78" y="128" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="start">Causa e efeito da queda de tensao em baixa tensao DC, com foco em corrente alta, cabo longo e carga critica.</text>
<rect x="70" y="178" width="1260" height="80" fill="#FFF0F0" rx="18" ry="18" stroke="#E9A2A2" stroke-width="2"/>
<text x="700" y="208" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="center">EM DC DE BAIXA TENSAO, POUCOS METROS E MUITOS AMPERES MUDAM O RESULTADO</text>
<rect x="70" y="300" width="386" height="425" fill="#FFFDF8" rx="18" ry="18" stroke="#D9E2EC" stroke-width="1"/>
<rect x="70" y="300" width="386" height="14" fill="#DB7C26" rx="10" ry="10"/>
<text x="94" y="350" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="start">Causas</text>
<rect x="94" y="389" width="10" height="10" fill="#DB7C26" rx="18" ry="18"/>
<text x="116" y="402" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Corrente alta para a mesma</text>
<text x="116" y="421" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">potencia em 12 V</text>
