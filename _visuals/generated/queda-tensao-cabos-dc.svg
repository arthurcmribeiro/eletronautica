<text x="544" y="618" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Diagnostico fica confuso por</text>
<text x="544" y="637" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">tensao falsa</text>
