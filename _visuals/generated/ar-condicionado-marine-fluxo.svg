<text x="124.0" y="635" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="start">Sem agua</text>
<text x="124.0" y="657" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">Pode parecer falha eletrica, mas e</text>
<text x="124.0" y="673" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">hidraulica.</text>
