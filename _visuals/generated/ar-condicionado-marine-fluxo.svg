<text x="78" y="92" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="start">Ar-condicionado marine: energia, agua e controle</text>
<text x="78" y="128" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="start">Fluxo visual entre alimentacao AC, protecao, bomba de agua, condensacao, evaporadora e controle.</text>
