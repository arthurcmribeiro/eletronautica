<text x="910.6666666666666" y="657" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">Fluxo baixo gera alarme e baixo</text>
<text x="910.6666666666666" y="673" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">rendimento.</text>
