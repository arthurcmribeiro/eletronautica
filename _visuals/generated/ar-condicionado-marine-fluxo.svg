<text x="517.3333333333333" y="657" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">Inversor/gerador pode cair na</text>
<text x="517.3333333333333" y="673" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">partida.</text>
