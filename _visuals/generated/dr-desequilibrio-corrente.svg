<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
<rect x="50" y="38" width="1300" height="116" fill="#FFFDF8" rx="22" ry="22" stroke="#E4D8C8" stroke-width="1"/>
<text x="78" y="68" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="start">ELETRO NAUTICA / VISUAL TECNICO</text>
<text x="78" y="92" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="start">DR: desequilibrio de corrente</text>
<text x="78" y="128" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="start">Causa e efeito do disparo de protecao diferencial por corrente que sai por um caminho e retorna por outro.</text>
<rect x="70" y="178" width="1260" height="80" fill="#FFF0F0" rx="18" ry="18" stroke="#E9A2A2" stroke-width="2"/>
<text x="700" y="208" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="center">DR DISPARA QUANDO A CORRENTE QUE SAI NAO VOLTA PELO CAMINHO ESPERADO</text>
<rect x="70" y="300" width="386" height="425" fill="#FFFDF8" rx="18" ry="18" stroke="#D9E2EC" stroke-width="1"/>
<rect x="70" y="300" width="386" height="14" fill="#1D6FD8" rx="10" ry="10"/>
<text x="94" y="350" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="start">Condicao</text>
<rect x="94" y="389" width="10" height="10" fill="#1D6FD8" rx="18" ry="18"/>
<text x="116" y="402" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Corrente sai pela fase</text>
<rect x="94" y="461" width="10" height="10" fill="#1D6FD8" rx="18" ry="18"/>
<text x="116" y="474" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Retorno esperado passa pelo neutro</text>
<text x="116" y="493" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">ou condutor ativo correspondente</text>
<rect x="94" y="533" width="10" height="10" fill="#1D6FD8" rx="18" ry="18"/>
<text x="116" y="546" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">DR mede a soma das correntes</text>
<rect x="94" y="605" width="10" height="10" fill="#1D6FD8" rx="18" ry="18"/>
<text x="116" y="618" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Sistema equilibrado nao dispara</text>
<line x1="464" y1="512" x2="488" y2="512" stroke="#5B6B79" stroke-width="2" stroke-linecap="round"/>
<line x1="488" y1="512" x2="472.4115427318801" y2="521.0" stroke="#5B6B79" stroke-width="2" stroke-linecap="round"/>
<line x1="488" y1="512" x2="472.4115427318801" y2="503.0" stroke="#5B6B79" stroke-width="2" stroke-linecap="round"/>
<rect x="498" y="300" width="386" height="425" fill="#FFFDF8" rx="18" ry="18" stroke="#D9E2EC" stroke-width="1"/>
<rect x="498" y="300" width="386" height="14" fill="#D9534F" rx="10" ry="10"/>
<text x="522" y="350" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="start">Falha</text>
<rect x="522" y="389" width="10" height="10" fill="#D9534F" rx="18" ry="18"/>
<text x="544" y="402" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Parte da corrente escapa por outro</text>
<text x="544" y="421" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">caminho</text>
<rect x="522" y="461" width="10" height="10" fill="#D9534F" rx="18" ry="18"/>
<text x="544" y="474" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Pode passar por massa, PE, agua ou</text>
<text x="544" y="493" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">pessoa</text>
<rect x="522" y="533" width="10" height="10" fill="#D9534F" rx="18" ry="18"/>
<text x="544" y="546" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">A soma deixa de fechar</text>
<rect x="522" y="605" width="10" height="10" fill="#D9534F" rx="18" ry="18"/>
<text x="544" y="618" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">DR interpreta risco de fuga</text>
<line x1="892" y1="512" x2="916" y2="512" stroke="#5B6B79" stroke-width="2" stroke-linecap="round"/>
<line x1="916" y1="512" x2="900.4115427318801" y2="521.0" stroke="#5B6B79" stroke-width="2" stroke-linecap="round"/>
<line x1="916" y1="512" x2="900.4115427318801" y2="503.0" stroke="#5B6B79" stroke-width="2" stroke-linecap="round"/>
<rect x="926" y="300" width="386" height="425" fill="#FFFDF8" rx="18" ry="18" stroke="#D9E2EC" stroke-width="1"/>
<rect x="926" y="300" width="386" height="14" fill="#2A9D57" rx="10" ry="10"/>
<text x="950" y="350" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="start">Acao</text>
<rect x="950" y="389" width="10" height="10" fill="#2A9D57" rx="18" ry="18"/>
<text x="972" y="402" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">DR abre o circuito monitorado</text>
<rect x="950" y="461" width="10" height="10" fill="#2A9D57" rx="18" ry="18"/>
<text x="972" y="474" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Disjuntor continua necessario para</text>
<text x="972" y="493" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">curto/sobrecarga</text>
<rect x="950" y="533" width="10" height="10" fill="#2A9D57" rx="18" ry="18"/>
<text x="972" y="546" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Teste deve considerar a topologia</text>
<rect x="950" y="605" width="10" height="10" fill="#2A9D57" rx="18" ry="18"/>
<text x="972" y="618" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Falha deve ser diagnosticada antes</text>
<text x="972" y="637" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">de religar</text>
<text x="70" y="862" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">FORMATO: CAUSA-EFEITO  |  PRIORIDADE: ALTA</text>
</svg>
