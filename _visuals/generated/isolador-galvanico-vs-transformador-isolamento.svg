<text x="1218" y="80" fill="#FFFDF8" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="center">SVG + PNG</text>
<text x="1218" y="104" fill="#D9E2EC" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="11" font-weight="400" text-anchor="center">versionavel</text>
