<text x="94" y="370" fill="#0F172A" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" text-anchor="start">Compare antes de</text>
<text x="94" y="394" fill="#0F172A" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" text-anchor="start">aplicar.</text>
<text x="94" y="434" fill="#5B6B79" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="start">Diferenciar mitigacao galvanica de</text>
<text x="94" y="453" fill="#5B6B79" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="start">barreira eletrica completa na</text>
<text x="94" y="472" fill="#5B6B79" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="start">interface com o cais.</text>
<text x="105" y="636" fill="#0F172A" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" text-anchor="start">pergunte sempre:</text>
<text x="105" y="660" fill="#5B6B79" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">O que muda? O que nao muda?</text>
<text x="105" y="677" fill="#5B6B79" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">Onde isso aparece no barco?</text>
