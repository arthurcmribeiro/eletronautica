<text x="640.0" y="648" fill="#7C5CC4" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="start">Transformador de</text>
<text x="640.0" y="666" fill="#7C5CC4" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="start">isolamento</text>
<rect x="1052" y="292" width="278" height="385" fill="#FFFDF8" rx="28" ry="28" stroke="#E4D8C8" stroke-width="1"/>
<rect x="1080" y="322" width="10" height="28" fill="#2A9D57" rx="6" ry="6"/>
<text x="1100" y="342" fill="#2A9D57" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" text-anchor="start">NA PRATICA</text>
<circle cx="1090" cy="390" r="12" fill="#1D6FD8"/>
<text x="1090" y="395" fill="#FFFDF8" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" text-anchor="center">1</text>
<text x="1116" y="393" fill="#5B6B79" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">Isolador galvanico atua</text>
<text x="1116" y="410" fill="#5B6B79" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">principalmente em baixas</text>
<text x="1116" y="427" fill="#5B6B79" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">tensoes galvanicas no</text>
<text x="1116" y="444" fill="#5B6B79" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">condutor de protecao.</text>
<circle cx="1090" cy="460" r="12" fill="#7C5CC4"/>
<text x="1090" y="465" fill="#FFFDF8" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" text-anchor="center">2</text>
<text x="1116" y="463" fill="#5B6B79" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">Transformador de isolamento</text>
<text x="1116" y="480" fill="#5B6B79" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">cria separacao eletrica</text>
<text x="1116" y="497" fill="#5B6B79" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">entre primario e secundario.</text>
<circle cx="1090" cy="530" r="12" fill="#1D6FD8"/>
<text x="1090" y="535" fill="#FFFDF8" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" text-anchor="center">3</text>
<text x="1116" y="533" fill="#5B6B79" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">Custo, peso, instalacao e</text>
<text x="1116" y="550" fill="#5B6B79" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">manutencao sao bem</text>
<text x="1116" y="567" fill="#5B6B79" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">diferentes.</text>
<circle cx="1090" cy="600" r="12" fill="#7C5CC4"/>
<text x="1090" y="605" fill="#FFFDF8" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" text-anchor="center">4</text>
<text x="1116" y="603" fill="#5B6B79" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">Escolha depende do risco,</text>
<text x="1116" y="620" fill="#5B6B79" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">porte e arquitetura do</text>
<text x="1116" y="637" fill="#5B6B79" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">barco.</text>
<rect x="70" y="708" width="1260" height="114" fill="#FFFDF8" rx="24" ry="24" stroke="#E4D8C8" stroke-width="1"/>
<text x="94" y="742" fill="#0F172A" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="start">LEITURA RAPIDA DA CARTILHA</text>
<circle cx="104.0" cy="780" r="10" fill="#DB7C26"/>
<text x="104.0" y="786" fill="#FFFDF8" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" text-anchor="center">1</text>
<text x="124.0" y="777" fill="#5B6B79" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">Bloqueia pequenas tensoes galvanicas no caminho de protecao, mantendo funcao de</text>
<text x="124.0" y="793" fill="#5B6B79" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">seguranca para falhas maiores conforme especificacao.</text>
<circle cx="708.0" cy="780" r="10" fill="#DB7C26"/>
<text x="708.0" y="786" fill="#FFFDF8" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" text-anchor="center">2</text>
<text x="728.0" y="777" fill="#5B6B79" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">Separa eletricamente marina e barco, criando secundario proprio para o sistema</text>
<text x="728.0" y="793" fill="#5B6B79" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">de bordo.</text>
<line x1="70" y1="842" x2="1330" y2="842" stroke="#E4D8C8" stroke-width="1" stroke-linecap="round"/>
