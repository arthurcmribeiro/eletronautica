<text x="700" y="218" fill="#0F172A" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="center">AMBOS REDUZEM PROBLEMAS DO CAIS, MAS NAO FAZEM A MESMA COISA</text>
<rect x="70" y="292" width="306" height="385" fill="#FFFDF8" rx="24" ry="24" stroke="#E4D8C8" stroke-width="1"/>
