<text x="82" y="96" fill="#0F172A" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="start">Isolador galvanico vs transformador de isolamento</text>
<text x="82" y="138" fill="#5B6B79" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="start">Comparativo entre protecao contra correntes galvanicas e isolamento eletrico completo da entrada AC.</text>
