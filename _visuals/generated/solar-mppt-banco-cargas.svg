<line x1="833.1999999999999" y1="395.0" x2="817.61154273188" y2="386.0" stroke="#5B6B79" stroke-width="2" stroke-linecap="round"/>
<rect x="839.1999999999999" y="300" width="234.4" height="190" fill="#FFFDF8" rx="18" ry="18" stroke="#D9E2EC" stroke-width="1"/>
<rect x="839.1999999999999" y="300" width="234.4" height="12" fill="#2A9D57" rx="10" ry="10"/>
<text x="863.1999999999999" y="344" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start">Banco</text>
<text x="863.1999999999999" y="392" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Armazena energia e estabiliza o</text>
<text x="863.1999999999999" y="412" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">consumo ao longo do dia.</text>
