<rect x="1095.6" y="300" width="234.4" height="12" fill="#7C5CC4" rx="10" ry="10"/>
<text x="1119.6" y="344" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start">Cargas</text>
<text x="1119.6" y="392" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">DC direto ou AC via inversor,</text>
<text x="1119.6" y="412" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">sempre descontando perdas.</text>
<rect x="70" y="560" width="1260" height="165" fill="#FFFDF8" rx="18" ry="18" stroke="#D9E2EC" stroke-width="1"/>
<text x="100" y="598" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start">ATENCOES DE CAMPO</text>
<rect x="100.0" y="622" width="10" height="10" fill="#DB7C26" rx="18" ry="18"/>
<text x="124.0" y="635" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="start">Sombra parcial</text>
<text x="124.0" y="657" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">Uma sombra pequena pode derrubar</text>
<text x="124.0" y="673" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">producao.</text>
<rect x="493.3333333333333" y="622" width="10" height="10" fill="#D9534F" rx="18" ry="18"/>
<text x="517.3333333333333" y="635" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="start">Perfil errado</text>
<text x="517.3333333333333" y="657" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">MPPT precisa da quimica correta do</text>
<text x="517.3333333333333" y="673" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">banco.</text>
<rect x="886.6666666666666" y="622" width="10" height="10" fill="#E0A100" rx="18" ry="18"/>
<text x="910.6666666666666" y="635" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="start">Expectativa</text>
<text x="910.6666666666666" y="657" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">Solar reduz deficit; nao cria</text>
<text x="910.6666666666666" y="673" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">energia infinita.</text>
<text x="70" y="862" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">FORMATO: FLUXO-DE-ENERGIA  |  PRIORIDADE: ALTA</text>
</svg>
