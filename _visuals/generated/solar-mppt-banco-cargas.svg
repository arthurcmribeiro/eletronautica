<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
<rect x="50" y="38" width="1300" height="116" fill="#FFFDF8" rx="22" ry="22" stroke="#E4D8C8" stroke-width="1"/>
<text x="78" y="68" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="start">ELETRO NAUTICA / VISUAL TECNICO</text>
<text x="78" y="92" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="start">Solar DC: painel, MPPT, banco e cargas</text>
<text x="78" y="128" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="start">Fluxo de energia solar a bordo desde o painel ate o banco e as cargas DC/AC via inversor.</text>
<rect x="70" y="178" width="1260" height="80" fill="#EEF7FF" rx="18" ry="18" stroke="#8CB9F4" stroke-width="2"/>
<text x="700" y="208" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="center">SOLAR AJUDA O BALANCO, MAS O BANCO CONTINUA SENDO O BUFFER DO SISTEMA</text>
<rect x="70.0" y="300" width="234.4" height="190" fill="#FFFDF8" rx="18" ry="18" stroke="#D9E2EC" stroke-width="1"/>
