<rect x="326.4" y="300" width="234.4" height="12" fill="#D9534F" rx="10" ry="10"/>
<text x="350.4" y="344" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start">Protecao</text>
<text x="350.4" y="392" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Fusiveis, seccionamento e cabos</text>
<text x="350.4" y="412" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">adequados para o circuito</text>
<text x="350.4" y="432" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">fotovoltaico.</text>
<line x1="564.8" y1="395.0" x2="576.8" y2="395.0" stroke="#5B6B79" stroke-width="2" stroke-linecap="round"/>
<line x1="576.8" y1="395.0" x2="561.2115427318801" y2="404.0" stroke="#5B6B79" stroke-width="2" stroke-linecap="round"/>
<line x1="576.8" y1="395.0" x2="561.2115427318801" y2="386.0" stroke="#5B6B79" stroke-width="2" stroke-linecap="round"/>
