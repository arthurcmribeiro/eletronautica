<text x="78" y="128" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="start">Visual para ler um unifilar por fontes, protecoes, distribuicao, cargas e referencias de aterramento/bonding.</text>
