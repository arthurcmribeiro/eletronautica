<line x1="1089.6" y1="395.0" x2="1074.0115427318801" y2="404.0" stroke="#5B6B79" stroke-width="2" stroke-linecap="round"/>
<line x1="1089.6" y1="395.0" x2="1074.0115427318801" y2="386.0" stroke="#5B6B79" stroke-width="2" stroke-linecap="round"/>
<rect x="1095.6" y="300" width="234.4" height="190" fill="#FFFDF8" rx="18" ry="18" stroke="#D9E2EC" stroke-width="1"/>
<rect x="1095.6" y="300" width="234.4" height="12" fill="#D9534F" rx="10" ry="10"/>
<text x="1119.6" y="344" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start">Proteger</text>
<text x="1119.6" y="392" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Desconecta em falha critica, mas</text>
<text x="1119.6" y="412" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">nao substitui protecao externa.</text>
<rect x="70" y="560" width="1260" height="165" fill="#FFFDF8" rx="18" ry="18" stroke="#D9E2EC" stroke-width="1"/>
<text x="100" y="598" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start">MENSAGEM DIDATICA</text>
<rect x="100.0" y="622" width="10" height="10" fill="#D9534F" rx="18" ry="18"/>
<text x="124.0" y="635" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="start">Nao e opcional</text>
<text x="124.0" y="657" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">LiFePO4 sem BMS e projeto</text>
<text x="124.0" y="673" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">incompleto.</text>
<rect x="493.3333333333333" y="622" width="10" height="10" fill="#DB7C26" rx="18" ry="18"/>
<text x="517.3333333333333" y="635" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="start">Nao e magico</text>
<text x="517.3333333333333" y="657" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">BMS nao corrige cabo e carregador</text>
<text x="517.3333333333333" y="673" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">errados.</text>
