<text x="350.4" y="344" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start">Comparar</text>
<text x="350.4" y="392" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Verifica limites de carga,</text>
<text x="350.4" y="412" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">descarga, temperatura e</text>
<text x="350.4" y="432" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">desequilibrio.</text>
<line x1="564.8" y1="395.0" x2="576.8" y2="395.0" stroke="#5B6B79" stroke-width="2" stroke-linecap="round"/>
<line x1="576.8" y1="395.0" x2="561.2115427318801" y2="404.0" stroke="#5B6B79" stroke-width="2" stroke-linecap="round"/>
<line x1="576.8" y1="395.0" x2="561.2115427318801" y2="386.0" stroke="#5B6B79" stroke-width="2" stroke-linecap="round"/>
