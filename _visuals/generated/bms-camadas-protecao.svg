<rect x="839.1999999999999" y="300" width="234.4" height="12" fill="#DB7C26" rx="10" ry="10"/>
<text x="863.1999999999999" y="344" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start">Limitar</text>
<text x="863.1999999999999" y="392" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Reduz ou corta carga/descarga</text>
<text x="863.1999999999999" y="412" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">antes de dano ou condicao</text>
<text x="863.1999999999999" y="432" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">insegura.</text>
