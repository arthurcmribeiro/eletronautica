<text x="910.6666666666666" y="635" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="start">Integracao importa</text>
<text x="910.6666666666666" y="657" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">Fontes precisam respeitar limites</text>
<text x="910.6666666666666" y="673" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start">informados.</text>
<text x="70" y="862" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">FORMATO: ARQUITETURA-DE-CONTROLE  |  PRIORIDADE: ALTA</text>
