<text x="1018" y="320" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" text-anchor="start">Motores e compressores</text>
<text x="1018" y="344" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Podem aquecer, vibrar mais e</text>
<text x="1018" y="366" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">partir pior.</text>
