<text x="1018" y="512" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" text-anchor="start">Eletronica sensivel</text>
<text x="1018" y="536" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Ruido, erro e incompatibilidade</text>
<text x="1018" y="558" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">ficam mais provaveis.</text>
