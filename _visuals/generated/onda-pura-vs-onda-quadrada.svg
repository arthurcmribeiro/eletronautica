<text x="1018" y="608" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" text-anchor="start">Cargas resistivas simples</text>
<text x="1018" y="632" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Lampadas e resistencias toleram</text>
<text x="1018" y="654" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">melhor, mas nao legitimam energia</text>
