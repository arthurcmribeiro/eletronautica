<text x="1018" y="416" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" text-anchor="start">Transformadores e fontes</text>
<text x="1018" y="440" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Zumbido, calor e menor eficiencia</text>
<text x="1018" y="462" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">aparecem cedo.</text>
