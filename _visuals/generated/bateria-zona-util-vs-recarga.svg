<text x="700" y="210" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="center">NAO USAR ESTE QUADRO DURANTE CARGA, DESCARGA OU PARA LFP SEM SHUNT</text>
