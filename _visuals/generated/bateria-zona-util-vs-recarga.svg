<text x="78" y="92" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="start">Bateria: zona util vs recarga</text>
<text x="78" y="128" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="start">Faixa visual de tensao em repouso para apoiar a leitura didatica de baterias de chumbo-acido 12 V, deixando explicito que se trata</text>
<text x="78" y="146" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="start">de analogia de campo e nao de oraculo universal.</text>
