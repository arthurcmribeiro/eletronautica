<text x="144" y="660" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Faixa mais confortavel para banco de chumbo-acido em repouso.</text>
<rect x="120" y="666" width="10" height="10" fill="#E0A100" rx="18" ry="18"/>
<text x="144" y="678" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" text-anchor="start">Atencao</text>
<text x="144" y="702" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Ainda nao e colapso, mas ja pede planejamento de recarga.</text>
