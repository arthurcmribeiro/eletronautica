<text x="144" y="720" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" text-anchor="start">Recarga</text>
<text x="144" y="744" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">Faixa que reforca a necessidade de recarregar antes de aprofundar a descarga.</text>
<text x="70" y="862" fill="#5B6B79" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start">FORMATO: FAIXA-OPERACIONAL  |  PRIORIDADE: ALTA</text>
